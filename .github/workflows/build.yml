name: Bake Pirojok

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: '🍽 Version of pirojok'
        required: false
        default: '1.0.0'
      build_windows:
        description: '🥟 Build for Windows'
        type: boolean
        default: true
      build_linux:
        description: '🐧 Build for Linux'
        type: boolean
        default: true
      build_macos:
        description: '🍎 Build for macOS'
        type: boolean
        default: true
      encryption_key:
        description: '🔐 Encryption key (16 chars)'
        required: true
        default: 'PirojokKey2024!!'

jobs:
  bake-windows-pirojok:
    if: github.event.inputs.build_windows == 'true' || github.event_name != 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Bake Windows pirojok v${{ github.event.inputs.version }}
        run: |
          echo "Baking Windows version ${{ github.event.inputs.version }}"
          # ... остальные шаги

  bake-linux-pirojok:
    if: github.event.inputs.build_linux == 'true' || github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Bake Linux pirojok v${{ github.event.inputs.version }}
        run: |
          echo "Baking Linux version ${{ github.event.inputs.version }}"

  bake-macos-pirojok:
    if: github.event.inputs.build_macos == 'true' || github.event_name != 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Bake macOS pirojok v${{ github.event.inputs.version }}
        run: |
          echo "Baking macOS version ${{ github.event.inputs.version }}"
